version: '3.8'

services:
  # 1. PostgreSQL dengan ekstensi pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: prd_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prd_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Ollama Server (Lokal LLM untuk Embedding)
  ollama:
    image: ollama/ollama
    container_name: prd_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 3. Main AI App (Gradio)
  app:
    build: .
    container_name: prd_agent_app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - OLLAMA_HOST=http://ollama:11434
      - GROQ_API_KEY=${GROQ_API_KEY} 
    ports:
      - "7860:7860"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - .:/app # Hot-reload kode
      - hf_cache:/app/model_cache # Menyimpan model IndoBERT agar tidak download ulang

volumes:
  pgdata:
  ollama_data:
  hf_cache: